name: Deploy gato

on:
  push:
    branches: [main]
    paths:
      - 'gato/**'
      - '.github/workflows/deploy-gato.yml'

permissions:
  contents: read

jobs:
  deploy:
    name: Test, build and deploy gato frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies (workspace root)
        run: npm ci

      - name: Test (gate — deploy only if tests pass)
        run: npm run test --workspace gato/frontend

      - name: Build
        run: npm run build --workspace gato/frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync build output to S3
        run: aws s3 sync gato/frontend/dist/ "s3://${{ secrets.GATO_BUCKET_NAME }}" --delete

      - name: Invalidate CloudFront cache
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ secrets.GATO_DISTRIBUTION_ID }}"
          --paths "/*"
